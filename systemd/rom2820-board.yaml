# /etc/relay/boards.d/rom2820.yaml
#
# Board profile for ROM2820 board-control workflows.
#
# This sample preserves the existing /etc/relay/channels.yaml flow and adds a
# separate board profile file for higher-level commands such as relay-board
# status, set-boot-mode, and boot-and-wait.
#
# Known ROM2820 switch mapping:
#   SW1003  -> relay channel 1
#   SW1002  -> relay channel 2
#   SW1001-2 -> relay channel 3
#   SW1001-1 -> relay channel 4
#
# Power-key and reset-key mappings were not provided yet, so they are left
# commented out below. Add them before using power-on/off/reset workflows.

name: rom2820

defaults:
  verify: true
  # power_signal: power_key
  # reset_signal: reset_key

signals:
  sw1003:
    channel: 1
    description: ROM2820 SW1003
  sw1002:
    channel: 2
    description: ROM2820 SW1002
  sw1001_2:
    channel: 3
    description: ROM2820 SW1001 position 2
  sw1001_1:
    channel: 4
    description: ROM2820 SW1001 position 1
  # power_key:
  #   channel: 5
  #   description: ROM2820 power key
  # reset_key:
  #   channel: 6
  #   description: ROM2820 reset key

timings:
  settle_delay: 0.5
  boot_wait: 1.0
  # power_on_pulse: 0.2
  # power_off_pulse: 6.0
  # reset_pulse: 0.2

boot_modes:
  manual:
    description: Safe placeholder that does not force any switch changes.
    signals: {}
  # Fill the exact states below from your ROM2820 manual revision before use.
  # emmc:
  #   signals:
  #     sw1001_1: off
  #     sw1001_2: off
  #     sw1002: off
  #     sw1003: off
  # sd:
  #   signals:
  #     sw1001_1: on
  #     sw1001_2: off
  #     sw1002: off
  #     sw1003: off
  # usb-recovery:
  #   risky: true
  #   signals:
  #     sw1001_1: on
  #     sw1001_2: on
  #     sw1002: on
  #     sw1003: on

