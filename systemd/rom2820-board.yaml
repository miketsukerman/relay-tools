# /etc/relay/boards.d/rom2820.yaml
#
# Board profile for ROM2820 board-control workflows.
#
# This sample preserves the existing /etc/relay/channels.yaml flow and adds a
# separate board profile file for higher-level commands such as relay-board
# status, set-boot-mode, and boot-and-wait.
#
# Known ROM2820 switch mapping:
#   SW1003  -> relay channel 1
#   SW1002  -> relay channel 2
#   SW1001-2 -> relay channel 3
#   SW1001-1 -> relay channel 4
#
# ROM2820 boot controls and general power are maintained switches.
# Reset-key mapping was not provided yet, so it remains commented out below.

name: rom2820

defaults:
  verify: true
  power_switch: general_power_input
  # reset_signal: reset_key

signals:
  # reset_key:
  #   channel: 6
  #   description: ROM2820 reset key

switches:
  sw1003:
    channel: 1
    description: ROM2820 SW1003
  sw1002:
    channel: 2
    description: ROM2820 SW1002
  sw1001_2:
    channel: 3
    description: ROM2820 SW1001 position 2
  sw1001_1:
    channel: 4
    description: ROM2820 SW1001 position 1
  general_power_input:
    channel: 5
    description: ROM2820 general power input

timings:
  settle_delay: 1.0
  boot_wait: 1.0
  # reset_pulse: 0.2

boot_modes:
  manual:
    description: Safe placeholder that does not force any switch changes.
    switches: {}
  # Fill the exact states below from your ROM2820 manual revision before use.
  # emmc:
  #   switches:
  #     sw1001_1: off
  #     sw1001_2: off
  #     sw1002: off
  #     sw1003: off
  # sd:
  #   switches:
  #     sw1001_1: on
  #     sw1001_2: off
  #     sw1002: off
  #     sw1003: off
  # usb-recovery:
  #   risky: true
  #   switches:
  #     sw1001_1: on
  #     sw1001_2: on
  #     sw1002: on
  #     sw1003: on

# Optional named workflows can be added here once reset mapping and any
# additional timing values are known.
# workflows:
#   power-force-off:
#     - action: set
#       switch: general_power_input
#       state: off
